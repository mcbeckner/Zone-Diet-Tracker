<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Diet Meal Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        h2 { border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="number"], input[type="text"], input[type="email"], input[type="password"], input[type="date"], select, textarea { 
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; 
        }
        button { width: 100%; padding: 10px; margin-top: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .secondary-btn { background-color: #007bff; }
        .secondary-btn:hover { background-color: #0069d9; }
        .logout-btn { background-color: #dc3545; }
        #app-section, #login-section { display: none; } 
        .result { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 4px; }
        .status-message { 
            text-align: center; 
            margin-top: 10px; 
            padding: 5px; 
            border-radius: 4px; 
            font-size: 0.9em; 
        }
        .status-message.error { color: red; background-color: #ffe0e0; border: 1px solid red; }
        .status-message.warning { color: orange; background-color: #fff8e1; border: 1px solid orange; }
        .status-message.success { color: green; background-color: #e8f5e9; border: 1px solid green; }
        .status-message.info { color: #555; background-color: #e0f2f7; border: 1px solid #ccc; }

        .section-divider { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        textarea { min-height: 150px; resize: vertical; }

        #daily-summary-content { margin-top: 15px; background-color: #f8f9fa; padding: 15px; border-radius: 5px; }
        .meal-entry, .recipe-ingredient { border: 1px solid #e9ecef; padding: 10px; margin-bottom: 8px; border-radius: 4px; background-color: #fff; }
        .meal-entry strong { color: #0056b3; }
        .blocks-summary { font-size: 1.1em; font-weight: bold; margin-top: 10px; }
        .blocks-summary.over { color: red; }
        .blocks-summary.under { color: orange; }
        .blocks-summary.on-target { color: green; }

        .recipe-ingredient { display: flex; align-items: center; margin-bottom: 5px; padding: 5px; background-color: #f1f8ff; }
        .recipe-ingredient select, .recipe-ingredient input { width: calc(50% - 10px); margin-right: 10px; }
        .recipe-ingredient .remove-ingredient { flex-shrink: 0; width: auto; margin: 0; padding: 5px 10px; background-color: #dc3545; color: white; border-radius: 4px; cursor: pointer; }
        .add-ingredient-btn { width: auto; padding: 8px 15px; margin-top: 10px; background-color: #007bff; color: white; border-radius: 4px; cursor: pointer; display: inline-block; }
        #recipe-ingredients-container { margin-bottom: 15px; border: 1px dashed #ccc; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="header-title">Zone Tracker Login</h1>
    
    <div id="login-section">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button id="login-btn">Log In</button>
        <button id="signup-btn" class="secondary-btn">Sign Up</button>
        <p id="auth-error" style="color: red; text-align: center;"></p>
    </div>

    <div id="app-section">
        <p>Welcome! <span id="user-email"></span></p>
        <button id="logout-btn" class="logout-btn">Log Out</button>
        <hr>
        
        <div class="section-divider">
            <h2>Your Settings</h2>
            <div class="form-group">
                <label for="daily-block-goal">Daily Block Goal (for EACH: Protein, Carb, Fat)</label>
                <input type="number" id="daily-block-goal" value="11" min="1" max="30">
            </div>
            <button id="save-settings-btn" class="secondary-btn">Save Settings</button>
        </div>

        <div class="section-divider">
            <h2>Today's Summary (<span id="current-date"></span>)</h2>
            <div id="daily-summary-content">
                <p>Loading summary...</p>
            </div>
        </div>

        <div class="section-divider">
            <h2>Log a Meal</h2>
            <div class="form-group">
                <label for="meal-date">Date</label>
                <input type="date" id="meal-date">
            </div>
            <div class="form-group">
                <label for="meal-type">Meal Type</label>
                <select id="meal-type">
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Dinner">Dinner</option>
                    <option value="Snack">Snack</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="select-recipe">Select a Global Recipe</label>
                <select id="select-recipe"></select>
            </div>

            <p>-- OR -- Enter individual blocks:</p>

            <div class="form-group"><label>Protein Blocks</label><input type="number" id="meal-protein-blocks" value="3" step="0.5"></div>
            <div class="form-group"><label>Carb Blocks</label><input type="number" id="meal-carb-blocks" value="3" step="0.5"></div>
            <div class="form-group"><label>Fat Blocks</label><input type="number" id="meal-fat-blocks" value="3" step="0.5"></div>

            <div class="form-group"><label>Protein Source</label><select id="protein-source"></select></div>
            <div class="form-group"><label>Carb Source</label><select id="carb-source"></select></div>
            <div class="form-group"><label>Fat Source</label><select id="fat-source"></select></div>
            
            <button id="calculate-meal-btn">Log Meal</button>
            
            <div class="result" id="meal-calculation-result" style="display:none;">
                <h3>Logged Food:</h3>
                <p id="meal-output"></p>
            </div>
        </div>

        <!-- Recipe Section -->
        <div class="section-divider">
            <h2>Create a Shared Recipe</h2>
            <div class="form-group">
                <label for="new-recipe-name">Recipe Name</label>
                <input type="text" id="new-recipe-name" placeholder="e.g., Shared Zone Salad">
            </div>
            <div id="recipe-ingredients-container"></div>
            <button id="add-ingredient-to-recipe-btn" class="add-ingredient-btn">Add Ingredient</button>
            <button id="save-new-recipe-btn" class="secondary-btn">Save Shared Recipe</button>
        </div>

        <!-- Food Repository Management -->
        <div class="section-divider">
            <h2>Bulk Add Foods</h2>
            <textarea id="bulk-food-data" placeholder='[{"name":"Broccoli","category":"carb","unit":"cups","perBlock":1.25}]'></textarea>
            <button id="bulk-add-foods-btn" class="secondary-btn">Bulk Add Foods</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, doc, getDoc, setDoc, updateDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDM47EtYj-yzw7ryBh-8xr3KQ7D6Sz4pP0",
      authDomain: "zonediettracker.firebaseapp.com",
      projectId: "zonediettracker",
      storageBucket: "zonediettracker.firebasestorage.app",
      messagingSenderId: "167080077633",
      appId: "1:167080077633:web:7761e0850292d7f51f99c0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentUserProfile = null;
    let foodDB = { protein: [], carb: [], fat: [] };

    const statusMessage = document.createElement('p'); 
    statusMessage.classList.add('status-message');
    document.querySelector('.container').appendChild(statusMessage);

    function updateStatus(message, type = 'info') { 
        statusMessage.textContent = message;
        statusMessage.className = 'status-message ' + type;
    }

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('user-email').innerText = user.email;
            await loadUserProfile(user.uid);
            await Promise.all([loadFoods(), loadRecipes(), loadDailyMeals(user.uid, document.getElementById('meal-date').value)]);
        } else {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('app-section').style.display = 'none';
        }
    });

    async function loadUserProfile(uid) {
        const userDocRef = doc(db, "users", uid);
        const userDocSnap = await getDoc(userDocRef);
        if (userDocSnap.exists()) {
            currentUserProfile = userDocSnap.data();
            document.getElementById('daily-block-goal').value = currentUserProfile.dailyBlockGoal || 11;
        } else {
            currentUserProfile = { email: currentUser.email, dailyBlockGoal: 11 };
            await setDoc(userDocRef, currentUserProfile);
        }
    }

    async function loadFoods() {
        const querySnapshot = await getDocs(collection(db, "foods"));
        foodDB = { protein: [], carb: [], fat: [] };
        querySnapshot.forEach((doc) => {
            const food = doc.data();
            if(foodDB[food.category]) foodDB[food.category].push(food);
        });
        populateFoodSelect(document.getElementById('protein-source'), foodDB.protein);
        populateFoodSelect(document.getElementById('carb-source'), foodDB.carb);
        populateFoodSelect(document.getElementById('fat-source'), foodDB.fat);
    }

    function populateFoodSelect(selectElement, dataArray) {
        selectElement.innerHTML = '<option value="">-- Optional Source --</option>';
        dataArray.sort((a, b) => a.name.localeCompare(b.name));
        dataArray.forEach(food => selectElement.add(new Option(food.name, JSON.stringify(food))));
    }

    // SHARED RECIPE LOADING (Removed userId filter)
    async function loadRecipes() {
        try {
            const q = query(collection(db, "recipes"), orderBy("name", "asc"));
            const querySnapshot = await getDocs(q);
            const select = document.getElementById('select-recipe');
            select.innerHTML = '<option value="">-- Select a Recipe --</option>';
            querySnapshot.forEach((doc) => {
                const recipe = doc.data();
                select.add(new Option(recipe.name, JSON.stringify(recipe)));
            });
        } catch (error) {
            updateStatus("Index building for recipes. Please wait 5 mins.", "warning");
        }
    }

    document.getElementById('save-new-recipe-btn').addEventListener('click', async () => {
        const name = document.getElementById('new-recipe-name').value;
        const ingredients = [];
        let p = 0, c = 0, f = 0;
        
        currentRecipeIngredients.forEach(ing => {
            ingredients.push({ name: ing.food.name, category: ing.food.category, blocks: ing.blocks });
            if(ing.food.category === 'protein') p += ing.blocks;
            if(ing.food.category === 'carb') c += ing.blocks;
            if(ing.food.category === 'fat') f += ing.blocks;
        });

        await addDoc(collection(db, "recipes"), {
            name,
            ingredients,
            totalProteinBlocks: p,
            totalCarbBlocks: c,
            totalFatBlocks: f,
            createdAt: serverTimestamp()
        });
        updateStatus("Global Recipe Saved!", "success");
        loadRecipes();
    });

    // Handle Calculation and Logging
    document.getElementById('calculate-meal-btn').addEventListener('click', async () => {
        const mealData = {
            userId: currentUser.uid,
            date: document.getElementById('meal-date').value,
            mealType: document.getElementById('meal-type').value,
            proteinBlocks: parseFloat(document.getElementById('meal-protein-blocks').value),
            carbBlocks: parseFloat(document.getElementById('meal-carb-blocks').value),
            fatBlocks: parseFloat(document.getElementById('meal-fat-blocks').value),
            timestamp: serverTimestamp()
        };
        await addDoc(collection(db, "mealLogs"), mealData);
        updateStatus("Meal Logged!", "success");
        loadDailyMeals(currentUser.uid, mealData.date);
    });

    // Daily Summary logic
    async function loadDailyMeals(uid, date) {
        const q = query(collection(db, "mealLogs"), where("userId", "==", uid), where("date", "==", date));
        const snap = await getDocs(q);
        let p = 0, c = 0, f = 0;
        let html = "";
        snap.forEach(doc => {
            const m = doc.data();
            p += m.proteinBlocks; c += m.carbBlocks; f += m.fatBlocks;
            html += `<div class="meal-entry"><strong>${m.mealType}</strong>: ${m.proteinBlocks}P, ${m.carbBlocks}C, ${m.fatBlocks}F</div>`;
        });
        const goal = currentUserProfile.dailyBlockGoal;
        document.getElementById('daily-summary-content').innerHTML = `
            <p>Protein: ${p}/${goal} | Carb: ${c}/${goal} | Fat: ${f}/${goal}</p>
            ${html}
        `;
    }

    // Recipe Ingredients Helper
    let currentRecipeIngredients = [];
    document.getElementById('add-ingredient-to-recipe-btn').addEventListener('click', () => {
        const ing = { food: foodDB.protein[0] || {}, blocks: 1 };
        currentRecipeIngredients.push(ing);
        renderRecipeIngredients();
    });

    function renderRecipeIngredients() {
        const container = document.getElementById('recipe-ingredients-container');
        container.innerHTML = "";
        currentRecipeIngredients.forEach((ing, i) => {
            const div = document.createElement('div');
            div.innerHTML = `<select id="ing-${i}"></select> <input type="number" id="ing-b-${i}" value="1"> blocks`;
            container.appendChild(div);
            const sel = div.querySelector('select');
            [...foodDB.protein, ...foodDB.carb, ...foodDB.fat].forEach(f => sel.add(new Option(f.name, JSON.stringify(f))));
            sel.addEventListener('change', (e) => currentRecipeIngredients[i].food = JSON.parse(e.target.value));
        });
    }

    // Settings
    document.getElementById('save-settings-btn').addEventListener('click', async () => {
        const goal = parseInt(document.getElementById('daily-block-goal').value);
        await updateDoc(doc(db, "users", currentUser.uid), { dailyBlockGoal: goal });
        currentUserProfile.dailyBlockGoal = goal;
        updateStatus("Settings Saved", "success");
    });
    
    // Auth & Misc
    document.getElementById('login-btn').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
    });
    document.getElementById('signup-btn').addEventListener('click', () => {
        createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
    });
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
    document.getElementById('meal-date').value = new Date().toISOString().split('T')[0];

</script>
</body>
</html>
