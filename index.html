<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Diet Meal Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        h2 { border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .secondary-btn { background-color: #007bff; }
        .logout-btn { background-color: #dc3545; }
        #app-section, #login-section { display: none; } 
        .status-message { text-align: center; margin-top: 10px; padding: 5px; border-radius: 4px; font-size: 0.9em; }
        .status-message.error { color: red; background-color: #ffe0e0; border: 1px solid red; }
        .status-message.success { color: green; background-color: #e8f5e9; border: 1px solid green; }
        .section-divider { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .meal-entry { border: 1px solid #e9ecef; padding: 10px; margin-bottom: 8px; border-radius: 4px; background-color: #fff; }
        .macro-summary-bar { background: #e9ecef; padding: 15px; border-radius: 5px; font-weight: bold; display: flex; justify-content: space-around; }
        .recipe-ingredient { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="header-title">Zone Tracker</h1>
    
    <!-- LOGIN -->
    <div id="login-section">
        <div class="form-group"><label>Email</label><input type="email" id="email"></div>
        <div class="form-group"><label>Password</label><input type="password" id="password"></div>
        <button id="login-btn">Log In</button>
        <button id="signup-btn" class="secondary-btn">Sign Up</button>
    </div>

    <!-- APP -->
    <div id="app-section">
        <p>Logged in as: <span id="user-email"></span> <button id="logout-btn" class="logout-btn" style="width: auto; padding: 5px 10px;">Logout</button></p>
        
        <div class="section-divider">
            <h2>Your Settings</h2>
            <div class="form-group">
                <label>Daily Block Goal (per macro)</label>
                <input type="number" id="daily-block-goal" value="11">
            </div>
            <button id="save-settings-btn" class="secondary-btn">Save Goal</button>
        </div>

        <div class="section-divider">
            <h2>Today's Summary (<span id="summary-date-display"></span>)</h2>
            <div class="macro-summary-bar" id="macro-summary">
                <span>P: 0/11</span> <span>C: 0/11</span> <span>F: 0/11</span>
            </div>
            <div id="daily-meals-list" style="margin-top: 15px;"></div>
        </div>

        <div class="section-divider">
            <h2>Log a Meal</h2>
            <div class="form-group"><label>Date</label><input type="date" id="meal-date"></div>
            <div class="form-group">
                <label>Meal Type</label>
                <select id="meal-type">
                    <option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Snack</option>
                </select>
            </div>
            <div class="form-group"><label>Use Shared Recipe</label><select id="recipe-select"></select></div>
            <hr>
            <div class="form-group"><label>Protein Blocks</label><input type="number" id="p-blocks" value="3" step="0.5"></div>
            <div class="form-group"><label>Carb Blocks</label><input type="number" id="c-blocks" value="3" step="0.5"></div>
            <div class="form-group"><label>Fat Blocks</label><input type="number" id="f-blocks" value="3" step="0.5"></div>
            <button id="log-meal-btn">Log Meal</button>
        </div>

        <div class="section-divider">
            <h2>Create Shared Recipe</h2>
            <div class="form-group"><label>Recipe Name</label><input type="text" id="recipe-name"></div>
            <div id="recipe-ingredients"></div>
            <button id="add-ing-btn" class="secondary-btn" style="width: auto;">+ Ingredient</button>
            <button id="save-recipe-btn">Save Shared Recipe</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, doc, getDoc, setDoc, updateDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDM47EtYj-yzw7ryBh-8xr3KQ7D6Sz4pP0",
      authDomain: "zonediettracker.firebaseapp.com",
      projectId: "zonediettracker",
      storageBucket: "zonediettracker.firebasestorage.app",
      messagingSenderId: "167080077633",
      appId: "1:167080077633:web:7761e0850292d7f51f99c0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userGoal = 11;
    let foodList = [];
    let currentIngs = [];

    const status = document.createElement('div');
    status.className = 'status-message';
    document.querySelector('.container').appendChild(status);

    function showStatus(msg, type='success') {
        status.innerText = msg;
        status.className = `status-message ${type}`;
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('user-email').innerText = user.email;
            
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                userGoal = userDoc.data().dailyBlockGoal || 11;
                document.getElementById('daily-block-goal').value = userGoal;
            }

            const foodsSnap = await getDocs(collection(db, "foods"));
            foodList = foodsSnap.docs.map(d => d.data());

            loadRecipes();
            refreshSummary();
        } else {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('app-section').style.display = 'none';
        }
    });

    // REFRESH SUMMARY
    async function refreshSummary() {
        const date = document.getElementById('meal-date').value;
        document.getElementById('summary-date-display').innerText = date;
        
        const q = query(collection(db, "mealLogs"), where("userId", "==", auth.currentUser.uid), where("date", "==", date));
        const snap = await getDocs(q);
        
        let pTotal = 0, cTotal = 0, fTotal = 0;
        let html = "";

        snap.forEach(d => {
            const m = d.data();
            // Fallback to 0 if data is missing/NaN to prevent "NaN" in UI
            const p = parseFloat(m.proteinBlocks) || 0;
            const c = parseFloat(m.carbBlocks) || 0;
            const f = parseFloat(m.fatBlocks) || 0;

            pTotal += p; cTotal += c; fTotal += f;
            html += `<div class="meal-entry"><strong>${m.mealType}</strong>: ${p}P, ${c}C, ${f}F</div>`;
        });

        document.getElementById('macro-summary').innerHTML = `
            <span>P: ${pTotal}/${userGoal}</span> 
            <span>C: ${cTotal}/${userGoal}</span> 
            <span>F: ${fTotal}/${userGoal}</span>
        `;
        document.getElementById('daily-meals-list').innerHTML = html;
    }

    // LOG MEAL
    document.getElementById('log-meal-btn').addEventListener('click', async () => {
        const meal = {
            userId: auth.currentUser.uid,
            date: document.getElementById('meal-date').value,
            mealType: document.getElementById('meal-type').value,
            proteinBlocks: parseFloat(document.getElementById('p-blocks').value) || 0,
            carbBlocks: parseFloat(document.getElementById('c-blocks').value) || 0,
            fatBlocks: parseFloat(document.getElementById('f-blocks').value) || 0,
            timestamp: serverTimestamp()
        };
        await addDoc(collection(db, "mealLogs"), meal);
        showStatus("Meal Logged!");
        refreshSummary();
    });

    // RECIPE SELECTION
    document.getElementById('recipe-select').addEventListener('change', (e) => {
        if(!e.target.value) return;
        const r = JSON.parse(e.target.value);
        document.getElementById('p-blocks').value = r.totalProteinBlocks;
        document.getElementById('c-blocks').value = r.totalCarbBlocks;
        document.getElementById('f-blocks').value = r.totalFatBlocks;
    });

    async function loadRecipes() {
        const snap = await getDocs(collection(db, "recipes"));
        const sel = document.getElementById('recipe-select');
        sel.innerHTML = '<option value="">-- Select a Recipe --</option>';
        snap.forEach(d => {
            const r = d.data();
            sel.add(new Option(r.name, JSON.stringify(r)));
        });
    }

    // ADD RECIPE
    document.getElementById('add-ing-btn').addEventListener('click', () => {
        const idx = currentIngs.length;
        currentIngs.push({ food: '', blocks: 1 });
        const div = document.createElement('div');
        div.className = 'recipe-ingredient';
        div.innerHTML = `<select id="ing-f-${idx}"></select> <input type="number" id="ing-b-${idx}" value="1" style="width:60px">`;
        document.getElementById('recipe-ingredients').appendChild(div);
        
        const fSel = document.getElementById(`ing-f-${idx}`);
        foodList.forEach(f => fSel.add(new Option(f.name, JSON.stringify(f))));
    });

    document.getElementById('save-recipe-btn').addEventListener('click', async () => {
        let p = 0, c = 0, f = 0;
        currentIngs.forEach((ing, i) => {
            const food = JSON.parse(document.getElementById(`ing-f-${i}`).value);
            const b = parseFloat(document.getElementById(`ing-b-${i}`).value);
            if(food.category === 'protein') p += b;
            if(food.category === 'carb') c += b;
            if(food.category === 'fat') f += b;
        });

        await addDoc(collection(db, "recipes"), {
            name: document.getElementById('recipe-name').value,
            totalProteinBlocks: p,
            totalCarbBlocks: c,
            totalFatBlocks: f
        });
        showStatus("Recipe Saved!");
        loadRecipes();
    });

    // SETTINGS & MISC
    document.getElementById('save-settings-btn').addEventListener('click', async () => {
        const g = parseInt(document.getElementById('daily-block-goal').value);
        await updateDoc(doc(db, "users", auth.currentUser.uid), { dailyBlockGoal: g });
        userGoal = g;
        showStatus("Goal Updated!");
        refreshSummary();
    });

    document.getElementById('login-btn').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => showStatus(e.message, 'error'));
    });
    document.getElementById('signup-btn').addEventListener('click', () => {
        createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => showStatus(e.message, 'error'));
    });
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
    document.getElementById('meal-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('meal-date').addEventListener('change', refreshSummary);

</script>
</body>
</html>
