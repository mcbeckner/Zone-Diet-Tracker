<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Diet Meal Builder</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .secondary-btn { background-color: #007bff; }
        .secondary-btn:hover { background-color: #0069d9; }
        .logout-btn { background-color: #dc3545; }
        .result { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 4px; }
        #app-section, #login-section { display: none; } /* Hidden by default */
    </style>
</head>
<body>

<div class="container">
    <h1 id="header-title">Zone Tracker Login</h1>
    
    <!-- LOGIN SECTION -->
    <div id="login-section">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button id="login-btn">Log In</button>
        <button id="signup-btn" class="secondary-btn">Sign Up</button>
        <p id="auth-error" style="color: red; text-align: center;"></p>
    </div>

    <!-- MAIN APP SECTION -->
    <div id="app-section">
        <p>Welcome! <span id="user-email"></span></p>
        <button id="logout-btn" class="logout-btn">Log Out</button>
        <hr>
        
        <div class="form-group">
            <label>How many blocks is this meal?</label>
            <input type="number" id="blocks" value="3" min="1" max="10">
        </div>
        <div class="form-group"><label>Protein</label><select id="protein"></select></div>
        <div class="form-group"><label>Carb</label><select id="carb"></select></div>
        <div class="form-group"><label>Fat</label><select id="fat"></select></div>
        
        <button id="calculate-btn">Calculate Meal</button>
        
        <div class="result" id="result-box" style="display:none;">
            <h3>Your Meal Plan:</h3>
            <p id="meal-output"></p>
        </div>
    </div>
</div>

<!-- FIREBASE SDKS (Using modules) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
    // IMPORT FIRESTORE
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

    // REPLACE THIS WITH YOUR EXACT FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDUM4wlGmfE5QJtBiY82NqkUkb-BQ15Ptc",
  authDomain: "zone-diet-tracker.firebaseapp.com",
  databaseURL: "https://zone-diet-tracker-default-rtdb.firebaseio.com",
  projectId: "zone-diet-tracker",
  storageBucket: "zone-diet-tracker.firebasestorage.app",
  messagingSenderId: "527744480772",
  appId: "1:527744480772:web:c29c569b9811b8116a2751"
};

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app); // INITIALIZE DATABASE

    // DOM Elements
    const loginSection = document.getElementById('login-section');
    const appSection = document.getElementById('app-section');
    const headerTitle = document.getElementById('header-title');
    const authError = document.getElementById('auth-error');

    // Auth State Listener
    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginSection.style.display = 'none';
            appSection.style.display = 'block';
            headerTitle.innerText = "Meal Builder";
            document.getElementById('user-email').innerText = user.email;
            loadFoods(); // Load foods from database when logged in
        } else {
            loginSection.style.display = 'block';
            appSection.style.display = 'none';
            headerTitle.innerText = "Zone Tracker Login";
        }
    });

    // Sign Up & Log In & Log Out (Same as before)
    document.getElementById('signup-btn').addEventListener('click', () => {
        createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .catch(error => authError.innerText = error.message);
    });

    document.getElementById('login-btn').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .catch(error => authError.innerText = error.message);
    });

    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    // --- DATABASE LOGIC ---
    let foodDB = { protein: [], carb: [], fat: [] };

    // Fetch foods from Firestore
    async function loadFoods() {
        const querySnapshot = await getDocs(collection(db, "foods"));
        foodDB = { protein: [], carb: [], fat: [] }; // Reset arrays
        
        // Clear old dropdowns
        document.getElementById("protein").innerHTML = "";
        document.getElementById("carb").innerHTML = "";
        document.getElementById("fat").innerHTML = "";

        querySnapshot.forEach((doc) => {
            const food = doc.data();
            if(foodDB[food.category]) {
                foodDB[food.category].push(food);
            }
        });

        populateSelect("protein", foodDB.protein);
        populateSelect("carb", foodDB.carb);
        populateSelect("fat", foodDB.fat);
    }

    function populateSelect(categoryId, dataArray) {
        const select = document.getElementById(categoryId);
        dataArray.forEach((food, index) => select.add(new Option(food.name, index)));
    }

    document.getElementById('calculate-btn').addEventListener('click', () => {
        const blocks = parseFloat(document.getElementById("blocks").value);
        const p = foodDB.protein[document.getElementById("protein").value];
        const c = foodDB.carb[document.getElementById("carb").value];
        const f = foodDB.fat[document.getElementById("fat").value];

        if(!p || !c || !f) {
            alert("Please make sure you have at least one protein, carb, and fat in your database!");
            return;
        }

        document.getElementById("meal-output").innerHTML = `
            <strong>Protein:</strong> ${(p.perBlock * blocks).toFixed(2)} ${p.unit} of ${p.name} <br>
            <strong>Carb:</strong> ${(c.perBlock * blocks).toFixed(2)} ${c.unit} of ${c.name} <br>
            <strong>Fat:</strong> ${(f.perBlock * blocks).toFixed(2)} ${f.unit} of ${f.name}
        `;
        document.getElementById("result-box").style.display = "block";
    });
</script>
</body>
</html>
