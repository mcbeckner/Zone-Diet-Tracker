<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Household Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #333; }
        .section-divider { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .delete-btn { background-color: #dc3545; width: auto; padding: 5px 10px; font-size: 12px; margin-left: 10px; }
        .secondary-btn { background-color: #007bff; }
        .logout-btn { background-color: #6c757d; width: auto; padding: 5px 10px; }
        .macro-summary-bar { background: #e9ecef; padding: 15px; border-radius: 5px; font-weight: bold; display: flex; justify-content: space-around; }
        .meal-entry { border: 1px solid #e9ecef; padding: 10px; margin-bottom: 8px; border-radius: 4px; background-color: #fff; display: flex; justify-content: space-between; align-items: center; }
        
        /* Planning Table */
        .plan-card { background: #f1f8ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d0e3ff; }
        .plan-result { background: #fff; padding: 10px; margin-top: 10px; border-left: 4px solid #007bff; font-size: 0.9em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        #app-section, #login-section { display: none; }
        .status-message { text-align: center; padding: 10px; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="header-title">Zone Household Tracker</h1>
    
    <div id="login-section">
        <div class="form-group"><label>Email</label><input type="email" id="email"></div>
        <div class="form-group"><label>Password</label><input type="password" id="password"></div>
        <button id="login-btn">Log In</button>
        <button id="signup-btn" class="secondary-btn">Sign Up</button>
    </div>

    <div id="app-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <p>User: <strong id="user-email-display"></strong></p>
            <button id="logout-btn" class="logout-btn">Logout</button>
        </div>

        <!-- SETTINGS -->
        <div class="section-divider">
            <h2>Settings</h2>
            <div class="grid">
                <div class="form-group">
                    <label>My Block Goal</label>
                    <input type="number" id="my-goal" value="11">
                </div>
            </div>
            <button id="save-settings-btn" class="secondary-btn">Update My Goal</button>
        </div>

        <!-- MEAL PLANNER (HOUSEHOLD) -->
        <div class="section-divider">
            <h2>Shared Household Meal Planner</h2>
            <p style="font-size: 0.8em; color: #666; text-align: center;">Plan your shared meal once, see individual portions below.</p>
            
            <div class="plan-card">
                <div class="form-group">
                    <label>Select Meal Type</label>
                    <select id="plan-type">
                        <option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Snack</option>
                    </select>
                </div>
                <div class="grid">
                    <div class="form-group"><label>Protein</label><select id="plan-p"></select></div>
                    <div class="form-group"><label>Carb</label><select id="plan-c"></select></div>
                    <div class="form-group"><label>Fat</label><select id="plan-f"></select></div>
                </div>
                <div class="grid">
                    <div class="form-group"><label>My Blocks</label><input type="number" id="plan-my-blocks" value="4"></div>
                    <div class="form-group"><label>Spouse Blocks</label><input type="number" id="plan-spouse-blocks" value="2"></div>
                </div>
                <button id="calculate-plan-btn">Calculate Portions</button>

                <div id="plan-output" style="display:none;">
                    <div class="plan-result">
                        <strong>My Portion:</strong><br><span id="my-portion-list"></span>
                    </div>
                    <div class="plan-result">
                        <strong>Spouse's Portion:</strong><br><span id="spouse-portion-list"></span>
                    </div>
                    <button id="log-plan-btn">Log My Portion to History</button>
                </div>
            </div>
        </div>

        <!-- DAILY SUMMARY -->
        <div class="section-divider">
            <h2>My Daily History (<span id="summary-date"></span>)</h2>
            <input type="date" id="history-date" style="margin-bottom: 10px;">
            <div class="macro-summary-bar" id="macro-summary">
                <span>P: 0/0</span> <span>C: 0/0</span> <span>F: 0/0</span>
            </div>
            <div id="meals-list" style="margin-top: 15px;"></div>
        </div>
    </div>
</div>

<!-- Include Firebase SDKs in the head or before your script -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";

    // --- YOUR FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "zonediettracker.firebaseapp.com",
      projectId: "zonediettracker",
      storageBucket: "zonediettracker.firebasestorage.app",
      messagingSenderId: "167080077633",
      appId: "1:167080077633:web:7761e0850292d7f51f99c0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- APP STATE ---
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const meals = [
        { id: 'brk', name: 'Breakfast', m: 4, d: 2 },
        { id: 'sn1', name: 'Snack 1', m: 2, d: 1 },
        { id: 'lun', name: 'Lunch', m: 4, d: 3 },
        { id: 'sn2', name: 'Snack 2', m: 2, d: 1 },
        { id: 'din', name: 'Dinner', m: 4, d: 3 }
    ];
    let foodList = [];
    let currentUser = null;

    // --- INITIALIZE & AUTH ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadFoodList();
            initPlannerUI();
            loadWeeklyPlan(); // Pull from Firebase
        } else {
            console.log("No user logged in. Redirecting to login...");
            // window.location.href = "login.html"; 
        }
    });

    async function loadFoodList() {
        // Option: Pull food list from Firestore 'foods' collection
        // For now, using your hardcoded list or a Firestore fetch
        foodList = [
            { name: "Chicken Breast", category: "protein", perBlock: 1.0, unit: "oz" },
            { name: "Egg Whites", category: "protein", perBlock: 2.0, unit: "cups" },
            { name: "Apple", category: "carb", perBlock: 0.5, unit: "large" },
            { name: "Oatmeal", category: "carb", perBlock: 0.3, unit: "cups" },
            { name: "Broccoli", category: "carb", perBlock: 1.25, unit: "cups" },
            { name: "Almonds", category: "fat", perBlock: 3, unit: "whole" }
        ];
    }

    // --- FIREBASE SAVE FUNCTION ---
    window.saveToFirebase = async function() {
        if (!currentUser) return alert("You must be logged in to save.");
        
        const planData = [];
        days.forEach(day => {
            const dayData = { day, meals: [] };
            meals.forEach(m => {
                const row = document.querySelector(`#day-${day} [data-meal-id="${m.id}"]`);
                const mealData = {
                    id: m.id,
                    mBlocks: row.querySelector('.in-m').value,
                    dBlocks: row.querySelector('.in-d').value,
                    selections: []
                };
                row.querySelectorAll('.food-row').forEach(fr => {
                    mealData.selections.push({
                        cat: fr.dataset.cat,
                        s1: fr.querySelector('.s1').value,
                        s2: fr.querySelector('.s2').value,
                        split: fr.querySelector('.s2').style.display !== 'none'
                    });
                });
                dayData.meals.push(mealData);
            });
            planData.push(dayData);
        });

        try {
            // We save the plan under a document named 'currentWeek' for simplicity
            // or you could name it by the date (e.g., '2026-04-27')
            await setDoc(doc(db, "weeklyPlans", "mitch-dee-week"), {
                userId: currentUser.uid,
                lastUpdated: new Date(),
                plan: planData
            });
            alert("Plan successfully saved to Firebase!");
        } catch (e) {
            console.error("Error saving document: ", e);
            alert("Error saving plan.");
        }
    }

    // --- FIREBASE LOAD FUNCTION ---
    async function loadWeeklyPlan() {
        const docRef = doc(db, "weeklyPlans", "mitch-dee-week");
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data().plan;
            data.forEach(d => {
                d.meals.forEach(m => {
                    const row = document.querySelector(`#day-${d.day} [data-meal-id="${m.id}"]`);
                    if(!row) return;
                    row.querySelector('.in-m').value = m.mBlocks;
                    row.querySelector('.in-d').value = m.dBlocks;
                    m.selections.forEach((sel, idx) => {
                        const fr = row.querySelectorAll('.food-row')[idx];
                        fr.querySelector('.s1').value = sel.s1;
                        fr.querySelector('.s2').value = sel.s2;
                        if(sel.split) {
                            fr.querySelector('.s2').style.display = 'block';
                            fr.querySelector('.split-btn').classList.add('active');
                        }
                    });
                });
            });
            calculate();
        } else {
            console.log("No saved plan found in Firebase. Starting fresh.");
        }
    }

    // --- UI LOGIC (Pasted from your working local version) ---
    function initPlannerUI() {
        // ... (Insert your existing init() logic here)
        // Ensure buttons call window.saveToFirebase() instead of saveToLocalStorage()
    }
</script>

</body>
</html>
