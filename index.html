<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Household Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #333; }
        .section-divider { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .delete-btn { background-color: #dc3545; width: auto; padding: 5px 10px; font-size: 12px; margin-left: 10px; }
        .secondary-btn { background-color: #007bff; }
        .logout-btn { background-color: #6c757d; width: auto; padding: 5px 10px; }
        .macro-summary-bar { background: #e9ecef; padding: 15px; border-radius: 5px; font-weight: bold; display: flex; justify-content: space-around; }
        .meal-entry { border: 1px solid #e9ecef; padding: 10px; margin-bottom: 8px; border-radius: 4px; background-color: #fff; display: flex; justify-content: space-between; align-items: center; }
        
        /* Planning Table */
        .plan-card { background: #f1f8ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d0e3ff; }
        .plan-result { background: #fff; padding: 10px; margin-top: 10px; border-left: 4px solid #007bff; font-size: 0.9em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        #app-section, #login-section { display: none; }
        .status-message { text-align: center; padding: 10px; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="header-title">Zone Household Tracker</h1>
    
    <div id="login-section">
        <div class="form-group"><label>Email</label><input type="email" id="email"></div>
        <div class="form-group"><label>Password</label><input type="password" id="password"></div>
        <button id="login-btn">Log In</button>
        <button id="signup-btn" class="secondary-btn">Sign Up</button>
    </div>

    <div id="app-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <p>User: <strong id="user-email-display"></strong></p>
            <button id="logout-btn" class="logout-btn">Logout</button>
        </div>

        <!-- SETTINGS -->
        <div class="section-divider">
            <h2>Settings</h2>
            <div class="grid">
                <div class="form-group">
                    <label>My Block Goal</label>
                    <input type="number" id="my-goal" value="11">
                </div>
            </div>
            <button id="save-settings-btn" class="secondary-btn">Update My Goal</button>
        </div>

        <!-- MEAL PLANNER (HOUSEHOLD) -->
        <div class="section-divider">
            <h2>Shared Household Meal Planner</h2>
            <p style="font-size: 0.8em; color: #666; text-align: center;">Plan your shared meal once, see individual portions below.</p>
            
            <div class="plan-card">
                <div class="form-group">
                    <label>Select Meal Type</label>
                    <select id="plan-type">
                        <option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Snack</option>
                    </select>
                </div>
                <div class="grid">
                    <div class="form-group"><label>Protein</label><select id="plan-p"></select></div>
                    <div class="form-group"><label>Carb</label><select id="plan-c"></select></div>
                    <div class="form-group"><label>Fat</label><select id="plan-f"></select></div>
                </div>
                <div class="grid">
                    <div class="form-group"><label>My Blocks</label><input type="number" id="plan-my-blocks" value="4"></div>
                    <div class="form-group"><label>Spouse Blocks</label><input type="number" id="plan-spouse-blocks" value="2"></div>
                </div>
                <button id="calculate-plan-btn">Calculate Portions</button>

                <div id="plan-output" style="display:none;">
                    <div class="plan-result">
                        <strong>My Portion:</strong><br><span id="my-portion-list"></span>
                    </div>
                    <div class="plan-result">
                        <strong>Spouse's Portion:</strong><br><span id="spouse-portion-list"></span>
                    </div>
                    <button id="log-plan-btn">Log My Portion to History</button>
                </div>
            </div>
        </div>

        <!-- DAILY SUMMARY -->
        <div class="section-divider">
            <h2>My Daily History (<span id="summary-date"></span>)</h2>
            <input type="date" id="history-date" style="margin-bottom: 10px;">
            <div class="macro-summary-bar" id="macro-summary">
                <span>P: 0/0</span> <span>C: 0/0</span> <span>F: 0/0</span>
            </div>
            <div id="meals-list" style="margin-top: 15px;"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, doc, getDoc, setDoc, updateDoc, query, where, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDM47EtYj-yzw7ryBh-8xr3KQ7D6Sz4pP0",
      authDomain: "zonediettracker.firebaseapp.com",
      projectId: "zonediettracker",
      storageBucket: "zonediettracker.firebasestorage.app",
      messagingSenderId: "167080077633",
      appId: "1:167080077633:web:7761e0850292d7f51f99c0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userGoal = 11;
    let foodList = [];

    // --- AUTH ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('user-email-display').innerText = user.email;
            
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                userGoal = userDoc.data().dailyBlockGoal || 11;
                document.getElementById('my-goal').value = userGoal;
            }

            const foodsSnap = await getDocs(collection(db, "foods"));
            foodList = foodsSnap.docs.map(d => d.data());
            populateDropdowns();
            refreshSummary();
        } else {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('app-section').style.display = 'none';
        }
    });

    function populateDropdowns() {
        const pSel = document.getElementById('plan-p');
        const cSel = document.getElementById('plan-c');
        const fSel = document.getElementById('plan-f');
        pSel.innerHTML = cSel.innerHTML = fSel.innerHTML = "";

        foodList.forEach(f => {
            const opt = new Option(f.name, JSON.stringify(f));
            if(f.category === 'protein') pSel.add(opt);
            if(f.category === 'carb') cSel.add(opt);
            if(f.category === 'fat') fSel.add(opt);
        });
    }

    // --- MEAL PLANNER LOGIC ---
    document.getElementById('calculate-plan-btn').addEventListener('click', () => {
        const p = JSON.parse(document.getElementById('plan-p').value);
        const c = JSON.parse(document.getElementById('plan-c').value);
        const f = JSON.parse(document.getElementById('plan-f').value);
        const myB = parseFloat(document.getElementById('plan-my-blocks').value);
        const spB = parseFloat(document.getElementById('plan-spouse-blocks').value);

        document.getElementById('my-portion-list').innerHTML = `
            ${(p.perBlock * myB).toFixed(1)} ${p.unit} ${p.name}, 
            ${(c.perBlock * myB).toFixed(1)} ${c.unit} ${c.name}, 
            ${(f.perBlock * myB).toFixed(1)} ${f.unit} ${f.name}
        `;
        document.getElementById('spouse-portion-list').innerHTML = `
            ${(p.perBlock * spB).toFixed(1)} ${p.unit} ${p.name}, 
            ${(c.perBlock * spB).toFixed(1)} ${c.unit} ${c.name}, 
            ${(f.perBlock * spB).toFixed(1)} ${f.unit} ${f.name}
        `;
        document.getElementById('plan-output').style.display = 'block';
    });

    document.getElementById('log-plan-btn').addEventListener('click', async () => {
        const myB = parseFloat(document.getElementById('plan-my-blocks').value);
        await addDoc(collection(db, "mealLogs"), {
            userId: auth.currentUser.uid,
            date: document.getElementById('history-date').value,
            mealType: document.getElementById('plan-type').value,
            proteinBlocks: myB, carbBlocks: myB, fatBlocks: myB,
            timestamp: serverTimestamp()
        });
        alert("Logged to your history!");
        refreshSummary();
    });

    // --- SUMMARY & DELETE ---
    async function refreshSummary() {
        const date = document.getElementById('history-date').value;
        document.getElementById('summary-date').innerText = date;
        const q = query(collection(db, "mealLogs"), where("userId", "==", auth.currentUser.uid), where("date", "==", date));
        const snap = await getDocs(q);
        
        let pT = 0, cT = 0, fT = 0;
        let html = "";
        snap.forEach(d => {
            const m = d.data();
            const p = m.proteinBlocks || 0; const c = m.carbBlocks || 0; const f = m.fatBlocks || 0;
            pT += p; cT += c; fT += f;
            html += `
                <div class="meal-entry">
                    <span><strong>${m.mealType}</strong>: ${p}P, ${c}C, ${f}F</span>
                    <button class="delete-btn" data-id="${d.id}">Delete</button>
                </div>`;
        });
        document.getElementById('macro-summary').innerHTML = `<span>P: ${pT}/${userGoal}</span> <span>C: ${cT}/${userGoal}</span> <span>F: ${fT}/${userGoal}</span>`;
        document.getElementById('meals-list').innerHTML = html;

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                if(confirm("Delete this meal?")) {
                    await deleteDoc(doc(db, "mealLogs", e.target.dataset.id));
                    refreshSummary();
                }
            });
        });
    }

    // --- SETTINGS ---
    document.getElementById('save-settings-btn').addEventListener('click', async () => {
        const g = parseInt(document.getElementById('my-goal').value);
        await updateDoc(doc(db, "users", auth.currentUser.uid), { dailyBlockGoal: g });
        userGoal = g;
        alert("Settings Saved!");
        refreshSummary();
    });

    // --- AUTH EVENTS ---
    document.getElementById('login-btn').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
    });
    document.getElementById('signup-btn').addEventListener('click', () => {
        createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
    });
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
    
    // Init Date
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('history-date').value = today;
    document.getElementById('history-date').addEventListener('change', refreshSummary);

</script>
</body>
</html>
