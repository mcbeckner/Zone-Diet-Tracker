<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Diet Meal Builder</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .secondary-btn { background-color: #007bff; }
        .secondary-btn:hover { background-color: #0069d9; }
        .logout-btn { background-color: #dc3545; }
        #app-section, #login-section { display: none; } /* Hidden by default */
        .result { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 4px; }
        .status-message { 
            text-align: center; 
            margin-top: 10px; 
            padding: 5px; 
            border-radius: 4px; 
            font-size: 0.9em; 
        }
        .status-message.error { color: red; background-color: #ffe0e0; border: 1px solid red; }
        .status-message.warning { color: orange; background-color: #fff8e1; border: 1px solid orange; }
        .status-message.success { color: green; background-color: #e8f5e9; border: 1px solid green; }
        .status-message.info { color: #555; background-color: #e0f2f7; border: 1px solid #ccc; }

        .add-food-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="header-title">Zone Tracker Login</h1>
    
    <!-- LOGIN SECTION -->
    <div id="login-section">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button id="login-btn">Log In</button>
        <button id="signup-btn" class="secondary-btn">Sign Up</button>
        <p id="auth-error" style="color: red; text-align: center;"></p>
    </div>

    <!-- MAIN APP SECTION -->
    <div id="app-section">
        <p>Welcome! <span id="user-email"></span></p>
        <button id="logout-btn" class="logout-btn">Log Out</button>
        <hr>
        
        <!-- MEAL CALCULATOR -->
        <h2>Meal Calculator</h2>
        <div class="form-group">
            <label>How many blocks is this meal?</label>
            <input type="number" id="blocks" value="3" min="1" max="10">
        </div>
        <div class="form-group"><label>Protein</label><select id="protein"></select></div>
        <div class="form-group"><label>Carb</label><select id="carb"></select></div>
        <div class="form-group"><label>Fat</label><select id="fat"></select></div>
        
        <button id="calculate-btn">Calculate Meal</button>
        
        <div class="result" id="result-box" style="display:none;">
            <h3>Your Meal Plan:</h3>
            <p id="meal-output"></p>
        </div>

        <!-- ADD NEW FOOD SECTION -->
        <div class="add-food-section">
            <h2>Add New Food</h2>
            <div class="form-group">
                <label for="new-food-name">Food Name</label>
                <input type="text" id="new-food-name" placeholder="e.g., Ground Beef (90/10)" required>
            </div>
            <div class="form-group">
                <label for="new-food-category">Category</label>
                <select id="new-food-category" required>
                    <option value="">Select Category</option>
                    <option value="protein">Protein</option>
                    <option value="carb">Carbohydrate</option>
                    <option value="fat">Fat</option>
                </select>
            </div>
            <div class="form-group">
                <label for="new-food-unit">Unit</label>
                <input type="text" id="new-food-unit" placeholder="e.g., oz, cup, tbsp, medium, nuts" required>
            </div>
            <div class="form-group">
                <label for="new-food-perblock">Amount per 1 Block (e.g., 1 for 1oz protein, 0.5 for 0.5 medium carb)</label>
                <input type="number" id="new-food-perblock" step="0.01" min="0.01" placeholder="e.g., 1, 0.5, 3" required>
            </div>
            <button id="save-new-food-btn" class="secondary-btn">Save New Food</button>
        </div>
    </div>
</div>

<!-- FIREBASE SDKS (Using modules) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
    // ADDED addDoc FOR WRITING TO FIRESTORE
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

    // YOUR EMBEDDED FIREBASE CONFIG (Use the latest config you provided)
    const firebaseConfig = {
      apiKey: "AIzaSyDM47EtYj-yzw7ryBh-8xr3KQ7D6Sz4pP0",
      authDomain: "zonediettracker.firebaseapp.com",
      projectId: "zonediettracker",
      storageBucket: "zonediettracker.firebasestorage.app",
      messagingSenderId: "167080077633",
      appId: "1:167080077633:web:7761e0850292d7f51f99c0"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM Elements
    const loginSection = document.getElementById('login-section');
    const appSection = document.getElementById('app-section');
    const headerTitle = document.getElementById('header-title');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const authError = document.getElementById('auth-error');
    
    // Status message element
    const statusMessage = document.createElement('p'); 
    statusMessage.classList.add('status-message');
    document.querySelector('.container').appendChild(statusMessage);

    function updateStatus(message, type = 'info') { // type can be 'info', 'success', 'warning', 'error'
        statusMessage.textContent = message;
        statusMessage.className = 'status-message ' + type;
    }

    // Auth State Listener
    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginSection.style.display = 'none';
            appSection.style.display = 'block';
            headerTitle.innerText = "Meal Builder";
            document.getElementById('user-email').innerText = user.email;
            updateStatus("Logged in successfully. Loading foods...", 'info');
            loadFoods(); // Load foods from database when logged in
        } else {
            loginSection.style.display = 'block';
            appSection.style.display = 'none';
            headerTitle.innerText = "Zone Tracker Login";
            updateStatus("Please log in or sign up.", 'info');
        }
    });

    // Auth functions
    document.getElementById('signup-btn').addEventListener('click', () => {
        createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
            .then(() => updateStatus("Signed up and logged in!", 'success'))
            .catch(error => {
                authError.innerText = error.message;
                updateStatus(`Signup error: ${error.message}`, 'error');
            });
    });

    document.getElementById('login-btn').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
            .then(() => updateStatus("Logged in!", 'success'))
            .catch(error => {
                authError.innerText = error.message;
                updateStatus(`Login error: ${error.message}`, 'error');
            });
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
        signOut(auth)
            .then(() => updateStatus("Logged out.", 'info'))
            .catch(error => updateStatus(`Logout error: ${error.message}`, 'error'));
    });

    // --- DATABASE LOGIC ---
    let foodDB = { protein: [], carb: [], fat: [] };

    async function loadFoods() {
        try {
            updateStatus("Attempting to load foods from Firestore...", 'info');
            const querySnapshot = await getDocs(collection(db, "foods"));
            
            if (querySnapshot.empty) {
                updateStatus("Firebase query returned an EMPTY result for 'foods' collection. No documents found.", 'warning');
                // Ensure dropdowns are cleared/disabled if no foods are found
                document.getElementById("protein").innerHTML = "";
                document.getElementById("carb").innerHTML = "";
                document.getElementById("fat").innerHTML = "";
                populateSelect("protein", []);
                populateSelect("carb", []);
                populateSelect("fat", []);
                return; 
            }

            updateStatus(`Firebase query found ${querySnapshot.docs.length} food documents. Processing...`, 'info');
            
            foodDB = { protein: [], carb: [] , fat: [] }; // Reset arrays
            
            // Clear old dropdowns
            document.getElementById("protein").innerHTML = "";
            document.getElementById("carb").innerHTML = "";
            document.getElementById("fat").innerHTML = "";

            querySnapshot.forEach((doc) => {
                const food = doc.data();
                if (!food.name || !food.category || typeof food.perBlock !== 'number' || !food.unit) {
                    updateStatus(`Warning: Skipping malformed food document (ID: ${doc.id}). Missing fields or incorrect 'perBlock' type (expected number).`, 'warning');
                    return; 
                }

                if(foodDB[food.category]) {
                    foodDB[food.category].push(food);
                } else {
                    updateStatus(`Warning: Food '${food.name}' (ID: ${doc.id}) has an unrecognized category '${food.category}'. Expected 'protein', 'carb', or 'fat'. Check spelling/casing.`, 'warning');
                }
            });

            populateSelect("protein", foodDB.protein);
            populateSelect("carb", foodDB.carb);
            populateSelect("fat", foodDB.fat);
            
            if (foodDB.protein.length === 0 && foodDB.carb.length === 0 && foodDB.fat.length === 0) {
                 updateStatus("Critical Error: No usable food items were found after processing the collection. Check Firestore data and categories.", 'error');
            } else if (foodDB.protein.length === 0 || foodDB.carb.length === 0 || foodDB.fat.length === 0) {
                 updateStatus(`Warning: Some food categories are empty. Protein: ${foodDB.protein.length}, Carb: ${foodDB.carb.length}, Fat: ${foodDB.fat.length}.`, 'warning');
            } else {
                updateStatus("Foods loaded, categorized, and dropdowns populated. Ready to calculate!", 'success');
            }

        } catch (error) {
            updateStatus(`FATAL ERROR loading foods from Firestore: ${error.name} - ${error.message}. Check Firebase Console -> Firestore -> Rules.`, 'error');
        }
    }

    function populateSelect(categoryId, dataArray) {
        const select = document.getElementById(categoryId);
        if (dataArray.length === 0) {
            select.add(new Option(`No ${categoryId}s available`, ''));
            select.disabled = true; // Disable if empty
            return;
        }
        select.disabled = false;
        // Sort alphabetically
        dataArray.sort((a, b) => a.name.localeCompare(b.name));
        select.innerHTML = '<option value="">-- Select --</option>'; // Add a default "Select" option
        dataArray.forEach((food, index) => {
            select.add(new Option(food.name, index));
        });
    }

    document.getElementById('calculate-btn').addEventListener('click', () => {
        const blocks = parseFloat(document.getElementById("blocks").value);
        const pIndex = document.getElementById("protein").value;
        const cIndex = document.getElementById("carb").value;
        const fIndex = document.getElementById("fat").value;

        if (pIndex === '' || cIndex === '' || fIndex === '') {
            updateStatus("Please select a food from all categories before calculating.", 'warning');
            return;
        }

        const p = foodDB.protein[pIndex];
        const c = foodDB.carb[cIndex];
        const f = foodDB.fat[fIndex];

        if(!p || !c || !f) {
            updateStatus("Calculation error: Selected food item not found. Please refresh and try again.", 'error');
            return;
        }

        document.getElementById("meal-output").innerHTML = `
            <strong>Protein:</strong> ${(p.perBlock * blocks).toFixed(2)} ${p.unit} of ${p.name} <br>
            <strong>Carb:</strong> ${(c.perBlock * blocks).toFixed(2)} ${c.unit} of ${c.name} <br>
            <strong>Fat:</strong> ${(f.perBlock * blocks).toFixed(2)} ${f.unit} of ${f.name}
        `;
        document.getElementById("result-box").style.display = "block";
        updateStatus("Meal calculated!", 'success');
    });

    // --- ADD NEW FOOD LOGIC ---
    document.getElementById('save-new-food-btn').addEventListener('click', async () => {
        const name = document.getElementById('new-food-name').value.trim();
        const category = document.getElementById('new-food-category').value;
        const unit = document.getElementById('new-food-unit').value.trim();
        const perBlock = parseFloat(document.getElementById('new-food-perblock').value);

        if (!name || !category || !unit || isNaN(perBlock) || perBlock <= 0) {
            updateStatus("Please fill in all fields correctly to add a new food.", 'warning');
            return;
        }

        const newFood = {
            name: name,
            category: category,
            unit: unit,
            perBlock: perBlock // This will automatically be stored as a 'double' in Firestore
        };

        try {
            await addDoc(collection(db, "foods"), newFood);
            updateStatus(`Food "${name}" added successfully!`, 'success');
            // Clear form fields
            document.getElementById('new-food-name').value = '';
            document.getElementById('new-food-category').value = '';
            document.getElementById('new-food-unit').value = '';
            document.getElementById('new-food-perblock').value = '';
            // Reload foods to update dropdowns
            loadFoods();
        } catch (error) {
            updateStatus(`Error adding food: ${error.message}`, 'error');
        }
    });

</script>

</body>
</html>
